#    container_name: clickhouse-server
#    ports:
#      - "8123:8123"
#      - "9000:9000"
#    environment:
#      - CLICKHOUSE_USER=default
#      - CLICKHOUSE_PASSWORD=123
#    volumes:
##      - ./playbook/clickhouse-config.xml:/etc/clickhouse-server/config.xml:ro
#      - clickhouse-data:/var/lib/clickhouse
#    restart: unless-stopped
#    networks:
#      - art-network

volumes:
  art-data:
    driver: local
  clickhouse-data:
    driver: local

networks:
  art-network:
    driver: bridge