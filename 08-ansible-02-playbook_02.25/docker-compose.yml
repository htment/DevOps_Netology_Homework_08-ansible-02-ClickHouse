version: '3.8'

services:
  container:
    build:
      context: .
      dockerfile: Dockerfile_CENTOS
      # args:
      #   - DEBIAN_FRONTEND=noninteractive
    image: centos
    container_name: test-click-container
    ports:
      - "2230:22"
      - "8123:8123"
      - "8686:8686"
      - "9000:9000"
    restart: unless-stopped
    stdin_open: true
    tty: true
    networks:
      - art-network
    volumes:
      - art-data:/home/art
      - ~/.ssh/id_ed25519.pub:/home/art/.ssh/authorized_keys:ro  # Добавьте эту строку

    # Добавлено для явного указания команды, если нужно переопределить CMD из Dockerfile
    # command: ["/usr/sbin/sshd", "-D", "-e"]

